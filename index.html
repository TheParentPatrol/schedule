<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>הורים ערים | לוח שיבוצים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;800;900&family=Heebo:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#060a12;
    --bg-1:#0a1120;
    --glass:rgba(20,32,52,0.50);
    --glass-strong:rgba(24,38,60,0.72);
    --border-soft:rgba(130,200,255,0.14);
    --border-strong:rgba(130,200,255,0.30);
    --cyan:#2fd8ff;
    --cyan-dim:rgba(47,216,255,0.16);
    --violet:#b58cff;
    --violet-dim:rgba(181,140,255,0.16);
    --amber:#ffb454;
    --danger:#ff5c7a;
    --danger-dim:rgba(255,92,122,0.16);
    --ok:#3be8a8;
    --text-0:#eaf2fb;
    --text-1:#9fb0c8;
    --text-2:#5f7089;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; height:100%; overflow:hidden;}
  body{
    background:
      radial-gradient(1100px 700px at 85% -10%, rgba(47,216,255,0.10), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(181,140,255,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    color:var(--text-0);
    font-family:'Heebo', sans-serif;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
    z-index:0;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  .display{font-family:'Rubik', sans-serif;}

  #app{position:relative; z-index:1; height:100%; display:flex; flex-direction:column;}

  /* ---------- Login ---------- */
  .login-wrap{
    position:relative;
    flex:1; height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    overflow:hidden;
  }
  .radar{
    position:absolute;
    width:640px; height:640px;
    top:50%; left:50%; transform:translate(-50%,-50%);
    border-radius:50%;
    border:1px solid rgba(47,216,255,0.16);
    pointer-events:none;
    z-index:0;
  }
  .radar::before, .radar::after{
    content:"";
    position:absolute; inset:70px;
    border-radius:50%;
    border:1px solid rgba(47,216,255,0.13);
  }
  .radar::after{inset:170px;}
  .radar-sweep{
    position:absolute; inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg, rgba(47,216,255,0.55), rgba(47,216,255,0.08) 16%, transparent 26%);
    animation:spin 6s linear infinite;
    opacity:0.9;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .login-card{
    position:relative; z-index:2;
    width:100%; max-width:420px;
    max-height:100%;
    overflow-y:auto;
    background:var(--glass-strong);
    border:1px solid var(--border-soft);
    border-radius:24px;
    padding:36px 30px 30px;
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:0 30px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:.18em;
    color:var(--cyan);
    text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
    margin-bottom:10px;
  }
  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--ok);
    box-shadow:0 0 8px var(--ok);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .login-card h1{
    font-family:'Rubik', sans-serif;
    font-weight:900;
    font-size:28px;
    margin:0 0 4px;
    letter-spacing:-.01em;
  }
  .login-card p.sub{color:var(--text-1); font-size:14px; margin:0 0 26px; line-height:1.6;}
  label{
    display:block; font-size:12px; color:var(--text-1);
    margin:16px 0 6px; font-family:'JetBrains Mono', monospace; letter-spacing:.04em;
  }
  input[type=text], input[type=email], input[type=password]{
    width:100%;
    background:rgba(6,10,18,0.55);
    border:1px solid var(--border-soft);
    color:var(--text-0);
    padding:12px 14px;
    border-radius:12px;
    font-size:15px;
    font-family:'Heebo', sans-serif;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 3px var(--cyan-dim);
  }
  .btn{
    appearance:none; border:none; cursor:pointer;
    font-family:'Rubik', sans-serif; font-weight:700; font-size:15px;
    border-radius:12px; padding:13px 18px;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .12s ease, box-shadow .12s ease, background .15s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{
    width:100%; margin-top:22px;
    background:linear-gradient(135deg, var(--cyan), #1a8fc9);
    color:#04121a;
    box-shadow:0 10px 26px rgba(47,216,255,0.25);
  }
  .btn-primary:hover{box-shadow:0 12px 32px rgba(47,216,255,0.4);}
  .btn-ghost{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border-soft);
    color:var(--text-1);
  }
  .btn-ghost:hover{color:var(--text-0); border-color:var(--border-strong);}
  .err{
    margin-top:14px; font-size:13px; color:var(--danger);
    background:var(--danger-dim); border:1px solid rgba(255,92,122,0.35);
    padding:9px 12px; border-radius:10px;
    display:none;
  }
  .err.show{display:block;}
  .hint{margin-top:18px; font-size:12px; color:var(--text-2); line-height:1.7; border-top:1px dashed var(--border-soft); padding-top:14px;}

  /* ---------- Dashboard ---------- */
  .topbar{
    flex:0 0 auto;
    background:rgba(8,13,22,0.75);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border-soft);
    padding:11px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-badge{
    width:42px;height:42px;border-radius:12px;
    background:radial-gradient(circle at 30% 30%, rgba(47,216,255,0.4), rgba(47,216,255,0.05));
    border:1px solid var(--border-strong);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
  }
  .brand h2{margin:0; font-family:'Rubik'; font-weight:800; font-size:19px;}
  .brand span.tag{display:block; font-family:'JetBrains Mono'; font-size:11px; color:var(--cyan); letter-spacing:.08em;}
  .whoami{display:flex;align-items:center; gap:12px; font-size:13px; color:var(--text-1);}
  .whoami b{color:var(--text-0);}
  .avatar{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg, var(--violet), #6c4fc9);
    display:flex;align-items:center;justify-content:center;
    font-family:'Rubik'; font-weight:800; font-size:14px; color:#fff;
  }

  .container{
    flex:1; min-height:0; overflow:hidden;
    max-width:1180px; width:100%; margin:0 auto;
    padding:14px 22px 12px;
    display:flex; flex-direction:column;
  }

  .month-bar{
    flex:0 0 auto;
    display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px 16px;
    margin-bottom:14px;
  }
  .month-title{font-size:24px; font-weight:900; margin:0; letter-spacing:-.01em;}
  .month-tabs{display:flex; gap:8px; flex-wrap:wrap;}
  .month-tab{
    appearance:none; cursor:pointer;
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:.03em;
    color:var(--text-1); background:rgba(255,255,255,0.03);
    border:1px solid var(--border-soft); border-radius:999px;
    padding:7px 14px;
    transition:all .15s ease;
  }
  .month-tab:hover{color:var(--text-0); border-color:var(--border-strong);}
  .month-tab.active{
    color:#04121a; background:linear-gradient(135deg, var(--cyan), #1a8fc9);
    border-color:transparent; font-weight:700;
  }

  .stats-row{
    flex:0 0 auto;
    display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
    margin-bottom:14px;
  }
  @media (max-width:760px){ .stats-row{grid-template-columns:repeat(2,1fr);} }
  .stat-card{
    background:var(--glass); border:1px solid var(--border-soft);
    border-radius:14px; padding:12px 16px;
    backdrop-filter:blur(14px);
  }
  .stat-card .k{font-family:'JetBrains Mono'; font-size:10.5px; color:var(--text-2); letter-spacing:.06em; text-transform:uppercase;}
  .stat-card .v{font-family:'Rubik'; font-weight:800; font-size:22px; margin-top:4px;}
  .stat-card .v.cy{color:var(--cyan);}
  .stat-card .v.vi{color:var(--violet);}
  .stat-card .v.ok{color:var(--ok);}

  .toolbar{flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
  .toolbar-title-row{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .toolbar h3{font-family:'Rubik'; font-size:18px; margin:0; font-weight:700;}
  .btn-maps{text-decoration:none; padding:8px 14px; font-size:12.5px;}
  .toolbar .legend{display:flex; gap:16px; font-size:12px; color:var(--text-1); flex-wrap:wrap;}
  .legend .lg-item{display:flex; align-items:center; gap:6px;}
  .legend .sw{width:10px;height:10px;border-radius:3px;}

  .board{
    flex:1; min-height:0;
    background:var(--glass); border:1px solid var(--border-soft);
    border-radius:20px; overflow:hidden;
    backdrop-filter:blur(14px);
    display:flex; flex-direction:column;
  }
  .board-scroll{flex:1; min-height:0; overflow:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch;}
  table.sched{border-collapse:separate; border-spacing:0; width:100%; min-width:760px;}
  table.sched thead th{
    position:sticky; top:0; z-index:5;
    background:rgba(10,17,30,0.92);
    font-family:'JetBrains Mono'; font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--text-1); font-weight:500;
    padding:14px 14px; text-align:right;
    border-bottom:1px solid var(--border-soft);
  }
  table.sched thead th.route-head{text-align:center;}
  table.sched thead th.route-head .rt-name{
    display:inline-flex; align-items:center; gap:6px; font-family:'Rubik'; font-size:12.5px; text-transform:none; letter-spacing:0;
  }
  table.sched thead th .dot{width:8px;height:8px;border-radius:50%; display:inline-block;}
  table.sched tbody td{
    padding:10px 14px; border-bottom:1px solid rgba(130,200,255,0.06);
    vertical-align:top;
  }
  table.sched tbody tr:hover{background:rgba(47,216,255,0.03);}
  tr.weekend td.date-cell{color:var(--amber);}
  td.date-cell{
    font-family:'JetBrains Mono'; white-space:nowrap; min-width:64px;
  }
  td.date-cell .d-num{font-size:16px; font-weight:700; color:var(--text-0);}
  td.date-cell .d-day{display:block; font-size:11px; color:var(--text-2); margin-top:2px;}
  td.hours-cell{font-family:'JetBrains Mono'; font-size:12.5px; color:var(--text-1); white-space:nowrap;}

  .route-col{min-width:210px;}
  .slot-stack{display:flex; flex-direction:column; gap:6px;}
  .slot{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:7px 10px;
    border-radius:10px;
    border:1px solid var(--border-soft);
    background:rgba(255,255,255,0.02);
    font-size:13px;
    cursor:pointer;
    transition:all .12s ease;
    user-select:none;
  }
  .slot .num{
    font-family:'JetBrains Mono'; font-size:10px; color:var(--text-2);
    width:16px; text-align:center; flex-shrink:0;
  }
  .slot .name{flex:1; text-align:right; color:var(--text-0); font-weight:500;}
  .slot.empty{border-style:dashed;}
  .slot.empty .name{color:var(--text-2); font-weight:400;}
  .slot.empty:hover{border-color:var(--cyan); background:var(--cyan-dim); box-shadow:0 0 0 3px rgba(47,216,255,0.08);}
  .slot.blocked{cursor:not-allowed; opacity:0.5;}
  .slot.blocked:hover{border-color:var(--border-soft); background:rgba(255,255,255,0.02); box-shadow:none;}
  .slot.blocked .name{color:var(--text-2);}
  .slot.mine{
    border-color:var(--ok); background:rgba(59,232,168,0.10);
  }
  .slot.mine .name{color:var(--ok); font-weight:700;}
  .slot.other{
    background:rgba(255,255,255,0.015);
    cursor:not-allowed;
    opacity:0.75;
  }
  .slot .x-btn{
    font-family:'JetBrains Mono'; font-size:13px; color:var(--danger);
    opacity:0; transition:opacity .12s;
    width:18px; text-align:center;
  }
  .slot.mine:hover .x-btn{opacity:1;}
  .slot .plus{color:var(--cyan); font-family:'JetBrains Mono'; font-size:14px; opacity:0; transition:opacity .12s;}
  .slot.empty:hover .plus{opacity:1;}
  .slot .lock{font-size:11px; color:var(--text-2);}

  .footbar{
    flex:0 0 auto;
    display:flex; justify-content:center; gap:14px; margin-top:12px; padding-top:4px;
  }
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--glass-strong); border:1px solid var(--border-strong);
    padding:12px 20px; border-radius:12px; font-size:13.5px;
    opacity:0; pointer-events:none; transition:all .25s ease;
    z-index:100; backdrop-filter:blur(14px);
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.err{border-color:var(--danger);}

  .btn-admin{
    background:linear-gradient(135deg, var(--amber), #b9791f);
    color:#241300;
  }
  .admin-badge{
    font-family:'JetBrains Mono'; font-size:10px; letter-spacing:.06em;
    color:var(--amber); border:1px solid rgba(255,180,84,0.4);
    background:rgba(255,180,84,0.12);
    padding:3px 8px; border-radius:8px;
  }
  .slot.admin-remove{cursor:pointer;}
  .slot.admin-remove .lock{display:none;}
  .slot.admin-remove:hover{border-color:var(--amber); box-shadow:0 0 0 3px rgba(255,180,84,0.12);}
  .slot.admin-remove:hover .x-admin{opacity:1;}
  .x-admin{font-family:'JetBrains Mono'; font-size:12px; color:var(--amber); opacity:0; transition:opacity .12s; width:18px; text-align:center;}

  .modal-overlay{
    position:fixed; inset:0; z-index:200;
    background:rgba(4,7,13,0.72); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal{
    width:100%; max-width:480px;
    background:var(--glass-strong); border:1px solid var(--border-strong);
    border-radius:20px; padding:26px 24px; max-height:88vh; overflow-y:auto;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
    position:relative;
  }
  .modal h3{font-family:'Rubik'; margin:0 0 4px; font-size:19px;}
  .modal p.sub{color:var(--text-1); font-size:13px; margin:0 0 20px;}
  .modal .field-row{display:flex; gap:8px; align-items:end;}
  .modal .field-row > div{flex:1;}
  .modal .field-row .btn{padding:12px 16px; white-space:nowrap;}
  .modal-section{border-top:1px solid var(--border-soft); margin-top:20px; padding-top:16px;}
  .modal-section h4{font-family:'Rubik'; font-size:14px; margin:0 0 10px; color:var(--text-1);}
  .modal-close{
    position:absolute; top:16px; left:16px;
    background:none; border:none; color:var(--text-1); font-size:20px; cursor:pointer;
  }
  .modal-actions{display:flex; gap:10px; flex-wrap:wrap;}
  .btn-danger{background:rgba(255,92,122,0.14); border:1px solid rgba(255,92,122,0.4); color:var(--danger);}
  .btn-danger:hover{background:rgba(255,92,122,0.22);}
  .connecting{
    position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center;
    background:var(--bg-0); color:var(--text-1); font-family:'JetBrains Mono'; font-size:13px; gap:10px;
  }

  ::-webkit-scrollbar{height:8px; width:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(130,200,255,0.25); border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  a{color:var(--cyan);}
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  button:focus-visible, input:focus-visible, .slot:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

  /* ---------- Mobile pass ---------- */
  @media (hover:none){
    /* touch devices have no hover, so action icons must be visible without it */
    .slot .plus, .slot .x-btn, .slot .x-admin{opacity:0.55;}
    .slot.mine .x-btn{opacity:0.85;}
  }
  @media (max-width:600px){
    .login-wrap{padding:16px;}
    .radar{width:420px; height:420px;}
    .radar::before{inset:46px;} .radar::after{inset:112px;}
    .login-card{padding:26px 20px 22px; border-radius:20px;}
    .login-card h1{font-size:23px;}
    .login-card p.sub{font-size:13px;}
    .topbar{padding:10px 14px; flex-direction:column; align-items:stretch; gap:8px;}
    .whoami{justify-content:space-between; width:100%; flex-wrap:wrap; gap:8px; font-size:12px;}
    .container{padding:10px 12px 8px;}
    .month-bar{margin-bottom:8px;}
    .month-title{font-size:18px;}
    .month-tab{padding:5px 10px; font-size:10.5px;}
    .stats-row{gap:8px; margin-bottom:8px;}
    .stat-card{padding:8px 10px; border-radius:11px;}
    .stat-card .k{font-size:9px;}
    .stat-card .v{font-size:17px; margin-top:2px;}
    .toolbar{align-items:flex-start; margin-bottom:8px;}
    .toolbar-title-row{gap:8px;}
    .toolbar h3{font-size:14px;}
    .btn-maps{padding:6px 11px; font-size:11px;}
    .legend{gap:8px; font-size:10.5px;}
    .board{border-radius:16px;}
    table.sched{min-width:640px;} /* still scrolls horizontally, just a lighter min */
    .route-col{min-width:172px;}
    .modal{padding:22px 18px;}
    .modal .field-row{flex-direction:column; align-items:stretch;}
    .modal .field-row .btn{width:100%;}
  }
  @media (max-width:380px){
    .radar{width:320px; height:320px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
/* ================================================================
   FIREBASE SETUP
   1) Go to https://console.firebase.google.com -> Add project (free)
   2) Inside the project: Build -> Firestore Database -> Create database
      (start in "test mode" is fine to begin with)
   3) Project settings (gear icon) -> General -> "Your apps" -> Web (</>) 
      -> register an app (no hosting needed) -> copy the firebaseConfig object
   4) Paste those values below, replacing the placeholders.
   5) In Firestore -> Rules tab, set:
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /{document=**} { allow read, write: if true; }
          }
        }
      (this keeps it open for this small trusted group; "test mode" rules
      expire after 30 days otherwise and the app will stop working)
   ================================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBq7H4gnakm1egYu-pj2M0WPF0i4ypX9vQ",
  authDomain: "horim-erim.firebaseapp.com",
  projectId: "horim-erim",
  storageBucket: "horim-erim.firebasestorage.app",
  messagingSenderId: "367764886674",
  appId: "1:367764886674:web:9792c46b91e0776827024b"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const settingsRef = doc(db, 'horimErim', 'settings');
const scheduleRef = doc(db, 'horimErim', 'schedule');

/* ============ DATA ============ */
const ROUTES = [
  {key:'route1', name:'מסלול כוכב יאיר', color:'var(--cyan)', dim:'var(--cyan-dim)'},

const WEEKEND_DAYS = ['שישי','שבת'];
const HEBREW_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function monthKeyOf(dateStr){ return dateStr.slice(0,7); } // 'YYYY-MM'
function monthLabel(key){
  const [y,m] = key.split('-');
  return HEBREW_MONTHS[parseInt(m,10)-1] + ' ' + y;
}
function groupMonthKeys(schedule){
  const seen = [];
  schedule.forEach(row=>{
    const k = monthKeyOf(row.date);
    if(!seen.includes(k)) seen.push(k);
  });
  return seen.sort(); // 'YYYY-MM' strings sort correctly lexicographically
}
function defaultMonthKey(monthKeys){
  const today = new Date();
  const todayKey = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0');
  if(monthKeys.includes(todayKey)) return todayKey;
  const upcoming = monthKeys.find(k => k >= todayKey);
  return upcoming || monthKeys[0];
}

}

function fmtDate(iso){

  return { num: d + '.' + m, };
}

/* ============ STORAGE HELPERS ============ */
/* Identity is per-device only -> plain localStorage is fine (no need to share it). */
function loadIdentity(){
  try{
    const raw = localStorage.getItem(IDENTITY_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveIdentity(identity){
  try{
    localStorage.setItem(IDENTITY_KEY, JSON.stringify(identity));
    localStorage.setItem(PROFILE_KEY, JSON.stringify({ name: identity.name, email: identity.email }));
  }catch(e){}
}
function clearIdentity(){
  // Logging out ends the active session only; name/email stay remembered for next time.
  try{ localStorage.removeItem(IDENTITY_KEY); }catch(e){}
}
function loadProfile(){
  try{
    const raw = localStorage.getItem(PROFILE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

  await setDoc(settingsRef, fresh);
  return fresh;
}
async function saveSettings(partial){
  await setDoc(settingsRef, { ...state.settings, ...partial }, { merge:true });
  state.settings = { ...state.settings, ...partial };
}
async function loadScheduleOnce(){
  const snap = await getDoc(scheduleRef);
  if(snap.exists()) return snap.data().rows;
  const rows = JSON.parse(JSON.stringify(SEED_SCHEDULE));
  await setDoc(scheduleRef, { rows });
  return rows;
}
async function saveSchedule(schedule){
  try{
    await setDoc(scheduleRef, { rows: schedule });
    return true;

    return false;

}
function watchSchedule(onChange){

function computeStats(schedule, myName){
  let total = 0, filled = 0;
  const volunteers = new Set();
  schedule.forEach(row=>{
    ROUTES.forEach(r=>{
      row[r.key].forEach(name=>{
        total++;
        if(name){ filled++; volunteers.add(name); }
      });
    });
  });
  const myShifts = schedule.reduce((acc,row)=>{
    ROUTES.forEach(r=>{ row[r.key].forEach(n=>{ if(n===myName) acc++; }); });
    return acc;
  },0);
  return { total, filled, open: total-filled, volunteers: volunteers.size, myShifts };
}

function slotHtml(row, routeKey, idx, identity){
  const name = row[routeKey][idx];
  const myName = identity.name;
  const isMine = name && name === myName;
  const isAdmin = !!identity.isAdmin;
  const adminOverride = name && !isMine && isAdmin;
  const blockedByOtherSlot = !name && !isAdmin && isAlreadyInShift(row, myName);

  let cls = !name ? 'empty' : (isMine ? 'mine' : 'other');
  if(adminOverride) cls += ' admin-remove';
  if(blockedByOtherSlot) cls = 'empty blocked';
  const label = name ? name : (blockedByOtherSlot ? 'כבר משובץ בתאריך זה' : 'פנוי — הצטרפו');

  let action = '';
  if(!name && !blockedByOtherSlot) action = `data-action="join" data-date="${row.date}" data-route="${routeKey}" data-idx="${idx}"`;
  else if(isMine) action = `data-action="leave" data-date="${row.date}" data-route="${routeKey}" data-idx="${idx}"`;
  else if(adminOverride) action = `data-action="admin-leave" data-date="${row.date}" data-route="${routeKey}" data-idx="${idx}"`;

  let trailing = `<span class="lock">🔒</span>`;
  if(!name && !blockedByOtherSlot) trailing = `<span class="plus">+</span>`;
  else if(isMine) trailing = `<span class="x-btn">✕</span>`;
  else if(adminOverride) trailing = `<span class="x-admin">✕</span>`;

  const titleTxt = blockedByOtherSlot ? 'כבר משובצים למשמרת הזו בתאריך זה'
    : (!name ? 'לחצו כדי להצטרף' : (isMine ? 'לחצו כדי לבטל שיבוץ' : (adminOverride ? 'הסרה על ידי אדמין' : 'תפוס')));
  return `<div class="slot ${cls}" tabindex="0" role="button" ${action} title="${titleTxt}">
      <span class="num">${idx+1}</span>
      <span class="name">${label}</span>
      ${trailing}
    </div>`;
}

    }
  });

  // Lock scrolling to one axis at a time (no diagonal drift from trackpad/mouse wheel)
  const boardScrollEl = document.getElementById('board-scroll');
  if(boardScrollEl){
    boardScrollEl.addEventListener('wheel', (e)=>{
      if(Math.abs(e.deltaX) > Math.abs(e.deltaY)){
        e.preventDefault();
        boardScrollEl.scrollLeft += e.deltaX;
      } else {
        e.preventDefault();
        boardScrollEl.scrollTop += e.deltaY;
      }
    }, { passive:false });

    // Same axis-lock for touch (Android + iOS): decide direction on first
    // real movement, then only scroll that axis for the rest of the gesture.
    let touchStartX = 0, touchStartY = 0, touchStartScrollLeft = 0, touchStartScrollTop = 0, touchAxis = null;
    boardScrollEl.addEventListener('touchstart', (e)=>{
      if(e.touches.length !== 1) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartScrollLeft = boardScrollEl.scrollLeft;
      touchStartScrollTop = boardScrollEl.scrollTop;
      touchAxis = null;
    }, { passive:true });

    boardScrollEl.addEventListener('touchmove', (e)=>{
      if(e.touches.length !== 1) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if(touchAxis === null){
        if(Math.abs(dx) < 8 && Math.abs(dy) < 8) return; // ignore tiny jitter / plain taps
        touchAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
      }
      e.preventDefault();
      if(touchAxis === 'x') boardScrollEl.scrollLeft = touchStartScrollLeft - dx;
      else boardScrollEl.scrollTop = touchStartScrollTop - dy;
    }, { passive:false });

    boardScrollEl.addEventListener('touchend', ()=>{ touchAxis = null; }, { passive:true });
  }
}

  if(existing) existing.remove();

  const overlay = el(`

      <div class="modal">
        <button class="modal-close" id="admin-modal-close">✕</button>

  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) overlay.remove(); });

  document.getElementById('save-group-pass').addEventListener('click', async ()=>{
    const val = document.getElementById('a-group-pass').value.trim();
    if(!val) return;
    await saveSettings({ groupPassword: val });
    showToast('סיסמת הקבוצה עודכנה');
  });
  document.getElementById('save-admin-pass').addEventListener('click', async ()=>{
    const val = document.getElementById('a-admin-pass').value.trim();
    if(!val) return;
    await saveSettings({ adminPassword: val });
    showToast('סיסמת הניהול עודכנה');
  });
  document.getElementById('clear-all-btn').addEventListener('click', async ()=>{
    if(!confirm('לנקות את כל השיבוצים הקיימים לכל התאריכים? פעולה זו בלתי הפיכה.')) return;
    const cleared = state.schedule.map(row=>({
      ...row, route1:[null,null,null], route2:[null,null,null]
    }));
    state.schedule = cleared;
    await saveSchedule(cleared);
    renderDashboard();
    overlay.remove();
    showToast('כל השיבוצים נוקו');
  });
  document.getElementById('reset-seed-btn').addEventListener('click', async ()=>{
    if(!confirm('לשחזר את הלוח לנתונים המקוריים מהאקסל? כל השינויים שנעשו יימחקו.')) return;
    const rows = JSON.parse(JSON.stringify(SEED_SCHEDULE));
    state.schedule = rows;
    await saveSchedule(rows);
    renderDashboard();
    overlay.remove();
    showToast('הלוח שוחזר לנתונים המקוריים');
  });
}

function isAlreadyInShift(row, name){
  return ROUTES.some(r => row[r.key].includes(name));
}

async function onSlotClick(e){
  const slot = e.target.closest ? e.target.closest('.slot') : null;
  if(!slot) return;
  const action = slot.getAttribute('data-action');
  if(!action) return; // locked / other's slot

  const date = slot.getAttribute('data-date');
  const routeKey = slot.getAttribute('data-route');
  const idx = parseInt(slot.getAttribute('data-idx'), 10);

  const row = state.schedule.find(r=>r.date===date);
  if(!row) return;

  if(action === 'join'){
    if(row[routeKey][idx]){ showToast('התפוס כבר נלקח, מרעננים...', true); return; }
    if(isAlreadyInShift(row, state.identity.name)){
      showToast('אתה כבר משובץ למשמרת הזו בתאריך הזה', true);
      return;
    }
    row[routeKey][idx] = state.identity.name;
  } else if(action === 'leave'){
    if(row[routeKey][idx] !== state.identity.name) { showToast('לא ניתן להסיר שיבוץ של מתנדב אחר', true); return; }
    row[routeKey][idx] = null;
  } else if(action === 'admin-leave'){
    if(!state.identity.isAdmin) return;
    row[routeKey][idx] = null;
  }

  renderDashboard();
  const ok = await saveSchedule(state.schedule);
  if(ok){
    showToast(action==='join' ? 'שובצתם בהצלחה לסיור ✅' : 'השיבוץ בוטל');
  }else{
    showToast('שמירה נכשלה, בודקים חיבור...', true);
  }
}

/* ============ BOOT ============ */
function enterDashboard(){
  renderDashboard();
  watchSchedule((rows)=>{
    state.schedule = rows;
    if(state.identity && !state.adminModalOpen) renderDashboard();
  });
}

async function boot(){
  state.settings = await loadSettings();
  state.schedule = await loadScheduleOnce();
  const months = groupMonthKeys(state.schedule);
  state.selectedMonth = defaultMonthKey(months);
  if(state.identity){
    enterDashboard();
  } else {
    renderLogin();
  }
}

function isConfigMissing(){
  return Object.values(firebaseConfig).some(v => typeof v === 'string' && v.startsWith('YOUR_'));
}

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(()=> reject(new Error('timeout')), ms))
  ]);
}

  const app = document.getElementById('app');
